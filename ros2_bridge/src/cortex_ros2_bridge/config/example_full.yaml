# Full bridge configuration exercising every schema feature.
version: 1

cortex:
  discovery_address: "ipc:///tmp/cortex_discovery"
  node_name_prefix: "cortex_bridge"

defaults:
  qos:
    reliability: reliable      # reliable | best_effort
    durability: volatile       # volatile | transient_local
    history: keep_last         # keep_last | keep_all
    depth: 10
  loaned_messages: auto        # auto | force | never

cortex_to_ros2:
  - name: lidar_points
    cortex:
      topic: "/sensor/lidar/points"
      type: PointCloudMessage
    ros2:
      topic: "/lidar/points"
      type: "sensor_msgs/msg/PointCloud2"
      frame_id: "lidar"
    qos:
      reliability: best_effort
      depth: 5

  - name: camera_image
    cortex:
      topic: "/sensor/camera/rgb"
      type: ImageMessage
    ros2:
      topic: "/camera/image_raw"
    qos:
      reliability: best_effort

  - name: robot_pose
    cortex:
      topic: "/state/pose"
      type: PoseMessage
    ros2:
      topic: "/robot/pose"
      broadcast_tf: true
      tf_parent: "map"

ros2_to_cortex:
  - name: cmd_vel
    ros2:
      topic: "/cmd_vel"
      type: "geometry_msgs/msg/Twist"
    cortex:
      topic: "/control/cmd"
      type: PoseMessage
    qos:
      reliability: reliable
      depth: 1

  - name: sim_clock
    ros2:
      topic: "/clock"
      type: "rosgraph_msgs/msg/Clock"
    cortex:
      topic: "/sim/time"
      type: TimestampMessage
    qos:
      durability: transient_local
