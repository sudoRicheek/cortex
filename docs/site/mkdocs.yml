site_name: Cortex
site_description: Lightweight Python pub/sub over ZeroMQ, for robotics and beyond.
site_url: https://sudoRicheek.github.io/cortex/
repo_url: https://github.com/sudoRicheek/cortex
repo_name: sudoRicheek/cortex
edit_uri: edit/main/docs/

docs_dir: .
site_dir: site
exclude_docs: |
  mkdocs.yml
  gen_ref_pages.py
  site/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:zensical.extensions.emoji.twemoji
      emoji_generator: !!python/name:zensical.extensions.emoji.to_svg

plugins:
  - search
  - section-index
  - literate-nav:
      nav_file: SUMMARY.md
  - gen-files:
      scripts:
        - gen_ref_pages.py
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [../src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            show_category_heading: true
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            show_if_no_docstring: false
            heading_level: 2
            filters:
              - "!^_"
              - "!^__"

nav:
  - Home: index.md
  - Getting started:
      - getting-started/installation.md
      - getting-started/quickstart.md
      - getting-started/discovery-daemon.md
  - Concepts:
      - concepts/architecture.md
      - concepts/message-wire-format.md
      - concepts/fingerprinting.md
      - concepts/discovery-protocol.md
      - concepts/transport-and-qos.md
      - concepts/async-execution-model.md
  - Components:
      - components/messages.md
      - components/discovery.md
      - components/publisher-subscriber.md
      - components/node-and-executors.md
      - components/serialization.md
  - Tutorials:
      - tutorials/custom-messages.md
      - tutorials/multi-node-system.md
      - tutorials/numpy-and-images.md
      - tutorials/pytorch-tensors.md
  - Guides:
      - guides/performance-tuning.md
      - guides/benchmarks.md
      - guides/debugging.md
  - Critique: critique.md
  - API reference: reference/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sudoRicheek/cortex
